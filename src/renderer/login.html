<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
  <title>gsdev - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Dark theme (default) */
    :root {
      --bg: #09090b;
      --bg-card: #18181b;
      --text: #fafafa;
      --text-muted: #a1a1aa;
      --text-logo: #fafafa;
      --border: #27272a;
      --btn-bg: #3b82f6;
      --btn-hover: #2563eb;
      --btn-shadow: 0 0 0 0.5px rgb(23, 23, 23), inset 0 0 0 1px rgba(255, 255, 255, 0.14);
    }

    /* Light theme */
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #ffffff;
        --bg-card: #f4f4f5;
        --text: #09090b;
        --text-muted: #71717a;
        --text-logo: #09090b;
        --border: #e4e4e7;
        --btn-bg: #3b82f6;
        --btn-hover: #2563eb;
        --btn-shadow: 0 0 0 0.5px rgba(0, 0, 0, 0.1), inset 0 0 0 1px rgba(0, 0, 0, 0.1);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      display: flex;
      height: 100vh;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      -webkit-app-region: drag;
    }

    .split-container {
      display: flex;
      width: 100%;
      height: 100%;
      -webkit-app-region: no-drag;
    }

    /* Left side - Brand/Logo area */
    .left-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
    }

    .brand-content {
      text-align: center;
      max-width: 400px;
    }

    .logo {
      height: 80px;
      width: auto;
      margin-bottom: 24px;
    }

    .logo .text-path {
      fill: var(--text-logo);
    }

    .brand-title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text);
    }

    .brand-description {
      font-size: 16px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* Right side - Sign-in form area */
    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .signin-content {
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .signin-title {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }

    .signin-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    .login-btn {
      width: 100%;
      height: 48px;
      padding: 0 24px;
      background: var(--btn-bg);
      color: #fafafa;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: background-color 0.15s ease, transform 0.15s ease;
      box-shadow: var(--btn-shadow);
    }

    .login-btn:hover {
      background: var(--btn-hover);
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .loading-spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fafafa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .btn-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* Responsive design */
    @media (max-width: 900px) {
      .split-container {
        flex-direction: column;
      }

      .left-panel {
        flex: 0 0 auto;
        padding: 32px;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .logo {
        height: 60px;
      }

      .brand-title {
        font-size: 24px;
      }

      .right-panel {
        flex: 1;
        padding: 32px;
      }
    }
  </style>
</head>

<body>
  <div class="split-container">
    <!-- Left Panel - Brand -->
    <div class="left-panel">
      <div class="brand-content">
        <img class="logo" src="./assets/logo.png" alt="GSDEV logo" />
        <h1 class="brand-title">GSDEV</h1>
        <p class="brand-description">
          Your intelligent development companion.<br>
          Build faster with AI-powered assistance.
        </p>
      </div>
    </div>

    <!-- Right Panel - Sign In -->
    <div class="right-panel">
      <div class="signin-content">
        <h2 class="signin-title">Sign in</h2>
        <p class="signin-subtitle">Access your workspace and continue where you left off</p>
        
        <button class="login-btn" id="loginBtn">
          <span class="btn-content">
            <span class="btn-text">Sign in with GSDEV</span>
            <div class="loading-spinner"></div>
          </span>
        </button>
      </div>
    </div>
  </div>

  <script>
    console.log('Login page loaded');
    console.log('window.desktopApi:', window.desktopApi);

    // Listen for auth success from main process (via deep link)
    // This ensures UI updates even if deep link arrives before click handler completes
    if (window.desktopApi && window.desktopApi.onAuthSuccess) {
      window.desktopApi.onAuthSuccess(function (user) {
        console.log('[Login] Auth success received:', user?.email);
        // Window will be reloaded by main process, no UI change needed
      });
    }

    const loginBtn = document.getElementById('loginBtn');
    const btnText = loginBtn.querySelector('.btn-text');
    const spinner = loginBtn.querySelector('.loading-spinner');

    loginBtn.addEventListener('click', function () {
      console.log('Sign in clicked');
      console.log('desktopApi available:', !!window.desktopApi);

      // Show loading state
      btnText.style.display = 'none';
      spinner.style.display = 'block';
      loginBtn.disabled = true;

      if (window.desktopApi && window.desktopApi.startAuthFlow) {
        console.log('Calling startAuthFlow...');
        window.desktopApi.startAuthFlow();
      } else {
        console.error('Desktop API not available');
        alert('Desktop API not available. Please restart the app.');
        // Reset button state
        btnText.style.display = 'inline';
        spinner.style.display = 'none';
        loginBtn.disabled = false;
      }
    });
  </script>
</body>

</html>
