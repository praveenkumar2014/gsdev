version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_KEY_GENERATION_URL=https://api.gsdev.dev/v1/keys/generate
      - API_KEY_VERIFICATION_URL=https://api.gsdev.dev/v1/keys/verify
      - APP_BASE_URL=https://gsdev.dev
      - API_BASE_URL=https://api.gsdev.dev
      - WEBHOOK_BASE_URL=https://webhooks.gsdev.dev
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=gsdev
      - POSTGRES_PASSWORD=gsdev_password
      - POSTGRES_DB=gsdev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
